<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Profesional</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <div>
                    <h1>Mi Lista de Tareas</h1>
                    <p>Organiza tu día de forma eficiente</p>
                </div>
                <button id="theme-btn" class="theme-btn" title="Cambiar tema">🌙</button>
            </div>
            
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">Total</span>
                    <span class="stat-value" id="total-tasks">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Completadas</span>
                    <span class="stat-value" id="completed-tasks">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Pendientes</span>
                    <span class="stat-value" id="pending-tasks">0</span>
                </div>
            </div>
        </header>

        <main>
            <section class="input-section">
                <div class="input-group">
                    <input type="text" id="todo-input" placeholder="¿Qué tienes pendiente hoy?">
                    <input type="time" id="todo-time">
                    <button id="now-btn" class="btn-secondary" title="Hora actual">⏰</button>
                </div>
                <button id="add-btn">Agregar Tarea</button>
            </section>

            <section class="list-section">
                <ul id="todo-list"></ul>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
